<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KubePlumber — Network Test Results</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @keyframes spin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }
    .spinning { animation: spin 1s linear infinite; }

    @keyframes pulse-border {
      0%, 100% { border-color: rgb(245 158 11 / 0.3); }
      50%       { border-color: rgb(245 158 11 / 0.8); }
    }
    .pulsing-border { animation: pulse-border 2s ease-in-out infinite; }

    ::-webkit-scrollbar { height: 6px; width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #374151; border-radius: 3px; }
  </style>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen antialiased">

  <!-- Header -->
  <header class="bg-gray-900/80 backdrop-blur border-b border-gray-800 sticky top-0 z-10">
    <div class="max-w-screen-xl mx-auto px-6 py-4 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <svg class="w-7 h-7 text-blue-400" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M9 17.25v1.007a3 3 0 0 1-.879 2.122L7.5 21h9l-.621-.621A3 3 0 0 1 15 18.257V17.25m6-12V15a2.25 2.25 0 0 1-2.25 2.25H5.25A2.25 2.25 0 0 1 3 15V5.25m18 0A2.25 2.25 0 0 0 18.75 3H5.25A2.25 2.25 0 0 0 3 5.25m18 0H3" />
        </svg>
        <div>
          <span class="text-lg font-bold text-white">KubePlumber</span>
          <span class="ml-2 text-sm text-gray-500">Network Diagnostics</span>
        </div>
      </div>
      <div id="overall-status" class="flex items-center gap-2 text-sm text-gray-500">
        Connecting&hellip;
      </div>
    </div>
  </header>

  <!-- Main -->
  <main class="max-w-screen-xl mx-auto px-6 py-8 space-y-6" id="results-container">
    <div class="flex items-center justify-center py-24 text-gray-600 text-sm gap-3">
      <svg class="spinning w-5 h-5 text-blue-500" fill="none" viewBox="0 0 24 24">
        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
      </svg>
      Loading results&hellip;
    </div>
  </main>

  <!-- Footer -->
  <footer class="text-center text-xs text-gray-700 py-8">
    <span id="last-updated"></span>
  </footer>

  <script>
    // ── Helpers ─────────────────────────────────────────────────────────────

    function escapeHTML(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function spinnerSVG(cls) {
      return `<svg class="spinning ${cls}" fill="none" viewBox="0 0 24 24">
        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
      </svg>`;
    }

    // ── Status badge ─────────────────────────────────────────────────────────

    function statusBadge(status) {
      const cfg = {
        pending:  { bg: 'bg-gray-700/60 text-gray-400 border border-gray-600',         label: 'Pending'  },
        running:  { bg: 'bg-amber-500/15 text-amber-400 border border-amber-500/40 pulsing-border', label: 'Running'  },
        complete: { bg: 'bg-emerald-500/15 text-emerald-400 border border-emerald-500/40', label: 'Complete' },
      };
      const c = cfg[status] || cfg.pending;
      const spinner = status === 'running'
        ? spinnerSVG('w-3 h-3 mr-1')
        : '';
      return `<span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium ${c.bg}">${spinner}${c.label}</span>`;
    }

    // ── Cell colouring ───────────────────────────────────────────────────────

    function cellClass(val) {
      if (val === 'Failed')                    return 'text-red-400 font-semibold';
      if (val === 'Succeeded' || val === 'Success') return 'text-emerald-400 font-semibold';
      if (val === 'true')                      return 'text-emerald-500';
      if (val === 'false')                     return 'text-gray-500';
      return 'text-gray-200';
    }

    // ── Section card ─────────────────────────────────────────────────────────

    function renderSection(section) {
      const rows  = section.rows  || [];
      const hdrs  = section.headers || [];

      let bodyHTML;
      if (rows.length === 0) {
        const msg = section.status === 'pending'
          ? '⏳&nbsp; Waiting to start…'
          : '⏳&nbsp; Collecting results…';
        bodyHTML = `<div class="px-6 py-10 text-center text-gray-600 text-sm">${msg}</div>`;
      } else {
        const headerCells = hdrs.map(h =>
          `<th class="px-4 py-3 text-left text-xs font-semibold text-gray-400 uppercase tracking-wider whitespace-nowrap select-none">${escapeHTML(h)}</th>`
        ).join('');

        const dataRows = rows.map((row, i) => {
          const cells = row.map(cell => {
            const cc = cellClass(cell);
            return `<td class="px-4 py-2.5 text-sm font-mono whitespace-nowrap ${cc}">${escapeHTML(cell)}</td>`;
          }).join('');
          const stripe = i % 2 === 0 ? 'bg-gray-900/40' : '';
          return `<tr class="${stripe} hover:bg-blue-950/20 transition-colors duration-75">${cells}</tr>`;
        }).join('');

        bodyHTML = `<div class="overflow-x-auto">
          <table class="w-full border-collapse text-sm">
            <thead class="bg-gray-800/70 sticky top-0">
              <tr>${headerCells}</tr>
            </thead>
            <tbody class="divide-y divide-gray-800/60">${dataRows}</tbody>
          </table>
        </div>`;
      }

      const borderAccent = {
        pending:  'border-l-gray-700',
        running:  'border-l-amber-500',
        complete: 'border-l-emerald-500',
      }[section.status] || 'border-l-gray-700';

      const rowCount = rows.length > 0
        ? `<span class="text-xs text-gray-500">${rows.length}&nbsp;row${rows.length !== 1 ? 's' : ''}</span>`
        : '';

      return `
        <section class="bg-gray-900 rounded-xl border border-gray-800 border-l-4 ${borderAccent} overflow-hidden shadow-xl">
          <div class="px-6 py-4 border-b border-gray-800 flex flex-wrap items-center gap-3">
            <h2 class="text-sm font-semibold text-gray-100 flex-1 tracking-wide">${escapeHTML(section.title)}</h2>
            ${rowCount}
            ${statusBadge(section.status)}
          </div>
          ${bodyHTML}
        </section>`;
    }

    // ── Overall status bar ───────────────────────────────────────────────────

    function renderOverallStatus(data) {
      const el = document.getElementById('overall-status');
      if (data.allComplete) {
        el.innerHTML = `<span class="inline-flex items-center gap-1.5 px-3 py-1 rounded-full bg-emerald-500/15 text-emerald-400 border border-emerald-500/40 text-xs font-medium">
          <svg class="w-3.5 h-3.5" fill="currentColor" viewBox="0 0 20 20">
            <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"/>
          </svg>
          All tests complete
        </span>`;
        return;
      }

      const sections = data.sections || [];
      const running  = sections.filter(s => s.status === 'running');
      const done     = sections.filter(s => s.status === 'complete').length;

      if (running.length) {
        el.innerHTML = `<span class="inline-flex items-center gap-2 text-amber-400 text-xs">
          ${spinnerSVG('w-3.5 h-3.5')}
          Running — ${done} / ${sections.length} complete
        </span>`;
      } else if (done === 0) {
        el.innerHTML = `<span class="text-gray-600 text-xs">Initialising…</span>`;
      } else {
        el.innerHTML = `<span class="text-gray-400 text-xs">${done} / ${sections.length} complete</span>`;
      }
    }

    // ── Poll loop ────────────────────────────────────────────────────────────

    async function fetchResults() {
      try {
        const res = await fetch('/api/results');
        if (!res.ok) return;
        const data = await res.json();

        const container = document.getElementById('results-container');
        const sections  = data.sections || [];

        if (sections.length === 0) {
          container.innerHTML = `<div class="flex items-center justify-center py-24 text-gray-600 text-sm gap-3">
            ${spinnerSVG('w-5 h-5 text-blue-500')} Waiting for tests to start…
          </div>`;
        } else {
          container.innerHTML = sections.map(renderSection).join('');
        }

        renderOverallStatus(data);

        const ts = document.getElementById('last-updated');
        if (ts) ts.textContent = 'Last updated: ' + new Date().toLocaleTimeString();
      } catch (_) {
        // silently retry
      }
    }

    fetchResults();
    setInterval(fetchResults, 2000);
  </script>
</body>
</html>
